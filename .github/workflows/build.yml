name: Build and Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Set FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 to true to bypass Node.js 20 deprecation warnings on GitHub Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        
    - name: Install and Cache Dependencies
      run: npm ci
      
    - name: Verify Types and Build Application
      run: npm run build
